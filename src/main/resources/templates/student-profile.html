<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — E-Voting Student</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="light">

<div class="page-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo-area">
            <svg class="sidebar-logo-icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 9h-2V7h-2v5H6v2h2v5h2v-5h2v-2z"/></svg>
            <span class="sidebar-logo-text">E-VOTING SYSTEM</span>
        </div>
        <nav class="sidebar-nav">
            <a th:href="@{/student/dashboard}" class="sidebar-nav-item">
                <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                <span class="sidebar-nav-text">Dashboard</span>
            </a>
            <a th:href="@{/student/apply}" class="sidebar-nav-item">
                <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                <span class="sidebar-nav-text">Run for Office</span>
            </a>
            <a th:href="@{/student/profile}" class="sidebar-nav-item active">
                <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span class="sidebar-nav-text">My Profile</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a th:href="@{/login}" class="sidebar-nav-item sign-out">
                <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                <span class="sidebar-nav-text">Sign Out</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <nav class="topbar">
            <div class="topbar-left">
                <h2 class="page-title">Manage Account</h2>
            </div>
            <div class="topbar-right">
                <div class="avatar-circle" th:text="${#strings.substring(session.username,0,1)}">S</div>
                <span class="topbar-username" th:text="${session.username}">Student</span>
                <button class="icon-btn" id="themeToggle" title="Toggle Dark Mode">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
        </nav>

        <div class="page-container" style="max-width: 600px; margin: 0 auto;">
            
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

            <div class="card" style="padding: var(--space-2xl);">
                <div style="text-align:center; margin-bottom: var(--space-2xl);">
                    <div style="width: 64px; height: 64px; background: var(--color-page); border: 2px solid var(--color-border); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 24px;">🛡️</div>
                    <h3 style="font-size: var(--text-h1); color: var(--color-text-heading); margin-bottom: 4px;">Security Settings</h3>
                    <p style="font-size: 14px; color: var(--color-text-muted);">Ensure your account remains secure by updating your password.</p>
                </div>

                <form th:action="@{/student/profile/password}" method="post">
                    <div class="group-floating">
                        <input type="password" id="currentPassword" name="currentPassword" placeholder=" " required>
                        <label for="currentPassword">Current Password</label>
                    </div>

                    <div class="group-floating">
                        <input type="password" id="newPassword" name="newPassword" placeholder=" " required minlength="6">
                        <label for="newPassword">New Password</label>
                    </div>

                    <div class="group-floating">
                        <input type="password" id="confirmNewPassword" name="confirmNewPassword" placeholder=" " required minlength="6">
                        <label for="confirmNewPassword">Confirm New Password</label>
                    </div>

                    <div style="margin-top: var(--space-xl);">
                        <button type="submit" class="btn btn-primary btn-full btn-lg">Update Password</button>
                    </div>
                </form>
            </div>

            <div class="caption" style="text-align: center; margin-top: var(--space-xl);">
                Your security is our priority. Never share your credentials.
            </div>

        </div>
    </main>
</div>

<script th:inline="javascript">
    const toggle = document.getElementById('themeToggle');
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
    if(toggle) {
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        });
    }
</script>
</body>
</html>
