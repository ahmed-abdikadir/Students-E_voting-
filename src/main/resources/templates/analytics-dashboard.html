<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Analytics — E-Voting</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        /* Stats Row */
        .analytics-kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-lg);
            margin-bottom: var(--space-2xl);
        }
        @media (max-width: 1024px) { .analytics-kpi-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 640px) { .analytics-kpi-grid { grid-template-columns: 1fr; } }

        .stat-card {
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--r-lg);
            padding: var(--space-lg);
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-top-width: 3px;
        }
        
        .stat-card:nth-child(1) { border-top-color: var(--color-primary); }
        .stat-card:nth-child(2) { border-top-color: var(--color-teal-500); }
        .stat-card:nth-child(3) { border-top-color: var(--color-warning); background-color: #FFFBEB; }
        .stat-card:nth-child(4) { border-top-color: var(--color-success); }

        .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-muted); }
        .stat-value { font-size: 32px; font-weight: var(--weight-display); font-family: var(--font-sans); color: var(--color-text-heading); line-height: 1; }
        .stat-value-sm { font-size: 20px; font-weight: 600; }

        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: var(--space-xl);
            margin-bottom: var(--space-2xl);
        }
        @media(max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }
        
        .chart-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--r-lg);
            padding: var(--space-xl);
            display: flex;
            flex-direction: column;
        }
        .chart-card h3 { font-size: var(--text-h2); font-weight: var(--weight-h2); color: var(--color-text-heading); margin: 0 0 var(--space-lg) 0; }
        .chart-container { position: relative; height: 320px; width: 100%; flex:1;}

        /* Podium Rankings */
        .ranking-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--r-lg);
            padding: var(--space-xl);
            margin-bottom: var(--space-2xl);
        }
        .ranking-card h3 { font-size: var(--text-h2); font-weight: var(--weight-h2); margin: 0 0 var(--space-lg) 0; }
        
        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }
        
        .ranking-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #F8FAFC;
            border-radius: var(--r-md);
            border: 1px solid var(--color-border);
            gap: 16px;
            opacity: 0;
            transform: translateY(10px);
            animation: slideUp 400ms ease forwards;
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .podium-badge {
            width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; font-size: 16px;
        }
        .podium-1 { background-color: #F59E0B; box-shadow: 0 4px 10px rgba(245, 158, 11, 0.4); } /* Gold */
        .podium-2 { background-color: #94A3B8; box-shadow: 0 4px 10px rgba(148, 163, 184, 0.4); } /* Silver */
        .podium-3 { background-color: #B45309; box-shadow: 0 4px 10px rgba(180, 83, 9, 0.3); } /* Bronze */
        .podium-other { background-color: var(--color-page); color: var(--color-text-muted); border: 1px solid var(--color-border); }
        
        .r-avatar { width: 40px; height: 40px; border-radius: 50%; background-color: var(--color-primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; }
        .r-name { flex: 1; font-weight: 600; font-size: 15px; color: var(--color-text-heading); }
        .r-votes { background-color: var(--color-page); font-size: 13px; font-weight: 600; padding: 4px 12px; border-radius: var(--r-full); border: 1px solid var(--color-border); color: var(--color-text-body); }
    </style>
</head>
<body class="light">

<div class="page-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="/admin/dashboard" class="sidebar-logo-area">
            <svg class="sidebar-logo-icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 9h-2V7h-2v5H6v2h2v5h2v-5h2v-2z"/></svg>
            <span class="sidebar-logo-text">E-VOTING ADMIN</span>
        </a>
        <nav class="sidebar-nav">
            <a th:href="@{/admin/dashboard}" class="sidebar-nav-item">
                <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                <span class="sidebar-nav-text">Dashboard</span>
            </a>
            <a th:href="@{/admin/elections}" class="sidebar-nav-item">
                <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                <span class="sidebar-nav-text">Elections</span>
            </a>
            <a th:href="@{/admin/candidates}" class="sidebar-nav-item">
                <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span class="sidebar-nav-text">Candidates</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a th:href="@{/login}" class="sidebar-nav-item sign-out">
                <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                <span class="sidebar-nav-text">Sign Out</span>
            </a>
        </div>
    </aside>

    <main class="main-content">
        <nav class="topbar">
            <div class="topbar-left" style="display:flex; align-items:center; gap: 16px;">
                <a th:href="@{/admin/dashboard}" class="btn btn-secondary" style="height:32px; min-height:32px; padding:0 12px; font-size:13px;">← Back</a>
                <div style="position:relative; display:flex; align-items:center;">
                    <select class="form-control" style="font-size:18px; font-weight:700; color:var(--color-text-heading); background:transparent; border:none; padding-right:28px; cursor:pointer; appearance:none; outline:none;" onchange="window.location.href='/admin/analytics/dashboard/' + this.value">
                        <option th:each="el : ${allElections}" th:value="${el.id}" th:text="${el.name}" th:selected="${el.id == electionId}"></option>
                    </select>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position:absolute; right:4px; pointer-events:none; color:var(--color-text-muted);"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </div>
                
                <span class="badge badge-live" th:if="${election.status != null and election.status.name() == 'OPEN'}">
                    <span class="pulse-circle"></span> LIVE
                </span>
                <span class="badge badge-closed" th:if="${election.status != null and election.status.name() == 'CLOSED'}">Closed</span>
            </div>
            <div class="topbar-right">
                <div class="avatar-circle" th:text="${#strings.substring(session.username,0,1)}">A</div>
                <span class="topbar-username" th:text="${session.username}">Admin</span>
            </div>
        </nav>

        <div class="page-container">
            <!-- KPIs -->
            <div class="analytics-kpi-grid">
                <div class="stat-card">
                    <span class="stat-label">Total Votes</span>
                    <span class="stat-value count-up" id="kpiTotalVotes" data-val="0">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Candidates</span>
                    <span class="stat-value count-up" th:data-val="${candidates.size()}" id="kpiCandidates">0</span>
                </div>
                <div class="stat-card" style="position:relative">
                    <span class="stat-label">Leading Candidate</span>
                    <span class="stat-value stat-value-sm" id="kpiLeader">—</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Highest Vote Count</span>
                    <span class="stat-value count-up" id="kpiMaxVotes" data-val="0">0</span>
                </div>
            </div>

            <!-- Charts -->
            <div class="charts-grid">
                <div class="chart-card">
                    <h3>Vote Distribution</h3>
                    <div class="chart-container">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <h3>Vote Share</h3>
                    <div class="chart-container">
                        <canvas id="donutChart"></canvas>
                        <!-- Center Label injected via Plugin -->
                    </div>
                </div>
            </div>

            <!-- Rankings -->
            <div class="ranking-card">
                <h3>Candidate Rankings</h3>
                <div class="ranking-list" id="rankingList">
                    <p class="caption">Loading live rankings...</p>
                </div>
            </div>
        </div>
    </main>
</div>

<script th:inline="javascript">
    const electionId = /*[[${electionId}]]*/ null;
    let barChart, donutChart;
    
    // Custom Plugin to draw text inside Bar Chart
    const barDataLabelsPlugin = {
        id: 'barDataLabels',
        afterDatasetsDraw(chart, args, pluginOptions) {
            const { ctx, data, scales: {y, x} } = chart;
            ctx.save();
            ctx.font = 'bold 12px Inter, sans-serif';
            ctx.textBaseline = 'middle';
            
            data.datasets[0].data.forEach((val, i) => {
                const meta = chart.getDatasetMeta(0);
                const bar = meta.data[i];
                if (!bar) return;
                
                // Only show label if >= 1 vote
                if (val > 0) {
                    const total = data.datasets[0].data.reduce((a,b)=>a+b, 0);
                    const pct = Math.round((val / total) * 100);
                    const text = `${val} (${pct}%)`;
                    
                    const barWidth = bar.width;
                    const textWidth = ctx.measureText(text).width;
                    const padding = 8;
                    
                    let textX, textY;
                    textY = bar.y;
                    
                    // Inside if > 20%, outside if <= 20%
                    if (pct > 20 && barWidth > textWidth + padding*2) {
                        ctx.fillStyle = '#FFFFFF';
                        ctx.textAlign = 'right';
                        textX = bar.x + barWidth - padding;
                    } else {
                        ctx.fillStyle = '#64748B'; // slate-500
                        ctx.textAlign = 'left';
                        textX = bar.x + barWidth + padding;
                    }
                    ctx.fillText(text, textX, textY);
                }
            });
            ctx.restore();
        }
    };

    // Custom Plugin to draw Center Text in Donut
    const donutCenterTextPlugin = {
        id: 'donutCenterText',
        beforeDraw(chart, args, pluginOptions) {
            const { ctx, width, height, data } = chart;
            const meta = chart.getDatasetMeta(0);
            if(data.datasets[0].data.length === 0 || data.datasets[0].data.reduce((a,b)=>a+b,0) === 0) return;
            
            ctx.save();
            const total = data.datasets[0].data.reduce((a,b)=>a+b, 0);
            
            // Find max val Index for Leader
            let maxIdx = 0; let maxVal = -1;
            data.datasets[0].data.forEach((val, i) => {
                if(val > maxVal) { maxVal = val; maxIdx = i; }
            });
            
            const leaderName = data.labels[maxIdx];
            const leaderPct = Math.round((maxVal / total) * 100) + '%';

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const cx = chart.getDatasetMeta(0).data[0].x;
            const cy = chart.getDatasetMeta(0).data[0].y;
            
            ctx.font = '600 15px Inter, sans-serif';
            ctx.fillStyle = '#0F172A';
            ctx.fillText(leaderName, cx, cy - 10);
            
            ctx.font = '400 12px Inter, sans-serif';
            ctx.fillStyle = '#64748B';
            ctx.fillText(leaderPct + ' Share', cx, cy + 10);
            ctx.restore();
        }
    };

    function initCharts() {
        const barCtx = document.getElementById('barChart').getContext('2d');
        barChart = new Chart(barCtx, {
            type: 'bar',
            data: { labels: [], datasets: [{ data: [], borderRadius: 4 }] },
            plugins: [barDataLabelsPlugin],
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { enabled: false } },
                scales: {
                    x: {
                        beginAtZero: true,
                        grid: { color: '#E2E8F0', drawBorder: false, tickLength: 0 },
                        border: { display: false },
                        ticks: { display: false } // Hide bottom numbers due to custom labels
                    },
                    y: {
                        grid: { display: false, drawBorder: false },
                        border: { display: false },
                        ticks: { font: { family: 'Inter', weight: 600, size: 12 }, color: '#334155' }
                    }
                },
                layout: { padding: { right: 50 } }
            }
        });

        const pieCtx = document.getElementById('donutChart').getContext('2d');
        pieChart = new Chart(pieCtx, {
            type: 'doughnut',
            data: { labels: [], datasets: [{ data: [], borderWidth: 2, borderColor: '#FFFFFF', hoverOffset: 4 }] },
            plugins: [donutCenterTextPlugin],
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '70%',
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const val = context.raw;
                                const total = context.dataset.data.reduce((a,b)=>a+b, 0);
                                const pct = total > 0 ? Math.round((val/total)*100) : 0;
                                return `${context.label} — ${val} vote${val!=1?'s':''} (${pct}%)`;
                            }
                        }
                    }
                }
            }
        });
    }

    function doCountUp(el, finalVal) {
        const currentVal = parseInt(el.innerText) || 0;
        if(currentVal === finalVal) return;
        const duration = 600; 
        const startTime = performance.now();
        function update(currTime) {
            const elapsed = currTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const ease = progress * (2 - progress);
            el.innerText = Math.floor(currentVal + (finalVal - currentVal) * ease);
            if(progress < 1) requestAnimationFrame(update);
            else el.innerText = finalVal;
        }
        requestAnimationFrame(update);
    }

    function generateColors(dataArr) {
        // Teal leader, Slate others
        const maxVal = Math.max(...dataArr.map(d=>d.votes));
        return dataArr.map((d,i) => {
            if(d.votes === maxVal && maxVal > 0) return '#14b8a6'; // teal-500
            return '#cbd5e1'; // slate-300
        });
    }

    function generateDonutColors(len) {
        const palette = ['#0E7490', '#1E3A5F', '#64748B', '#0284c7', '#94a3b8'];
        return Array.from({length:len}, (_,i) => palette[i % palette.length]);
    }

    function updateView(chartData) {
        // Find leader and total
        let totalVotes = 0;
        let maxVotes = -1; let leader = '—';
        chartData.forEach(d => {
            totalVotes += d.votes;
            if(d.votes > maxVotes) { maxVotes = d.votes; leader = d.name; }
        });
        
        doCountUp(document.getElementById('kpiTotalVotes'), totalVotes);
        if(maxVotes > 0) doCountUp(document.getElementById('kpiMaxVotes'), maxVotes);
        else document.getElementById('kpiMaxVotes').innerText = '0';
        document.getElementById('kpiLeader').innerText = maxVotes > 0 ? leader : '—';

        // Update Charts
        const labels = chartData.map(d => d.name);
        const votes = chartData.map(d => d.votes);
        
        barChart.data.labels = labels;
        barChart.data.datasets[0].data = votes;
        barChart.data.datasets[0].backgroundColor = generateColors(chartData);
        barChart.update('none');

        pieChart.data.labels = labels;
        pieChart.data.datasets[0].data = votes;
        pieChart.data.datasets[0].backgroundColor = generateDonutColors(chartData.length);
        pieChart.update('none');

        // Update Podium Rankings
        // Create sorted copy
        const sorted = [...chartData].sort((a,b) => b.votes - a.votes);
        const rl = document.getElementById('rankingList');
        if(totalVotes === 0) {
            rl.innerHTML = '<p class="caption">No votes cast yet.</p>';
        } else {
            let html = '';
            sorted.forEach((item, index) => {
                const rank = index + 1;
                let badgeClass = 'podium-other'; let rankText = rank;
                if(rank === 1) { badgeClass = 'podium-1'; rankText = '1'; }
                if(rank === 2) { badgeClass = 'podium-2'; rankText = '2'; }
                if(rank === 3) { badgeClass = 'podium-3'; rankText = '3'; }
                
                const initial = item.name.charAt(0).toUpperCase();
                
                html += `
                <div class="ranking-item" style="animation-delay: ${index * 80}ms">
                    <div class="podium-badge ${badgeClass}">${rankText}</div>
                    <div class="r-avatar">${initial}</div>
                    <div class="r-name">${item.name}</div>
                    <div class="r-votes">${item.votes} votes</div>
                </div>
                `;
            });
            rl.innerHTML = html;
        }
    }

    function loadLiveData() {
        if(!electionId) return;
        fetch(`/admin/analytics/api/live-votes/${electionId}`)
            .then(r => r.json())
            .then(data => {
                if (data.success && data.data) {
                    updateView(data.data);
                }
            }).catch(e => console.error(e));
    }

    window.addEventListener('load', () => {
        // Initial CountUp for Candidates
        const candKpi = document.getElementById('kpiCandidates');
        doCountUp(candKpi, parseInt(candKpi.getAttribute('data-val')||0));
        
        initCharts();
        loadLiveData();
        setInterval(loadLiveData, 3000);
    });
</script>
</body>
</html>
