<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — E-Voting</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <!-- Top Navbar -->
    <nav class="student-navbar">
        <span class="navbar-brand">E-Voting System</span>
        <div class="navbar-user">
            <span>Welcome, <strong th:text="${session.username}">Student</strong></span>
            <div th:if="${session.role == 'ADMIN'}">
                <a th:href="@{/admin/dashboard}" class="btn btn-sm btn-primary">Admin Panel</a>
            </div>
            <a th:href="@{/login}" class="btn btn-sm btn-secondary">Sign Out</a>
        </div>
    </nav>

    <!-- Page Body -->
    <div class="student-page-body">
        <div style="width:100%; max-width:720px;">

            <div class="page-heading">
                <h1>Active Elections</h1>
                <p>Select an election below to cast your vote or view results.</p>
            </div>

            <!-- No elections -->
            <div th:if="${elections.isEmpty()}" class="card card-md" style="text-align:center; padding:48px 32px;">
                <div style="font-size:2.5rem; margin-bottom:12px;">🗳️</div>
                <p style="color:var(--slate-500); font-size:0.95rem;">No active elections at the moment.<br>Check back
                    later.</p>
            </div>

            <!-- Election list -->
            <ul class="election-list" th:unless="${elections.isEmpty()}">
                <li class="election-item" th:each="election : ${elections}">
                    <span class="election-item-name" th:text="${election.name}">Election Name</span>
                    <div th:switch="${session.role}">
                        <a th:case="'ADMIN'" th:href="@{/election/{id}/results(id=${election.id})}"
                            class="btn btn-sm btn-secondary">View Results</a>
                        <a th:case="'STUDENT'" th:href="@{/student/election/{id}(id=${election.id})}"
                            class="btn btn-sm btn-primary">Vote</a>
                    </div>
                </li>
            </ul>

        </div>
    </div>

</body>

</html>
