<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Candidates — E-Voting</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* Modal overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.4);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 480px;
            margin: 16px;
        }

        .modal-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--slate-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--slate-900);
        }

        .modal-close {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--slate-400);
            font-size: 1.2rem;
            line-height: 1;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
        }

        .modal-close:hover {
            background: var(--slate-100);
            color: var(--slate-700);
        }

        .modal-body {
            padding: 20px 24px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--slate-200);
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
    </style>
</head>

<body>
    <div class="admin-layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="sidebar-brand-name">E-Voting System</div>
                <div class="sidebar-brand-title">Admin Panel</div>
            </div>
            <ul class="sidebar-nav">
                <li><a href="/admin/dashboard">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7" />
                            <rect x="14" y="3" width="7" height="7" />
                            <rect x="3" y="14" width="7" height="7" />
                            <rect x="14" y="14" width="7" height="7" />
                        </svg>
                        Dashboard
                    </a></li>
                <li><a href="/admin/elections">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path
                                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                        </svg>
                        Elections
                    </a></li>
                <li><a href="/admin/candidates" class="active">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        Candidates
                    </a></li>
                <li><a href="/admin/students">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path
                                d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0" />
                        </svg>
                        Students
                    </a></li>
            </ul>
            <div class="sidebar-footer">
                <a th:href="@{/login}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Sign Out
                </a>
            </div>
        </aside>

        <!-- Main -->
        <div class="admin-main">
            <div class="admin-topbar">
                <span class="admin-topbar-title">Manage Candidates</span>
                <button class="btn btn-primary btn-sm" onclick="openModal()">+ Add Candidate</button>
            </div>

            <div class="admin-content">

                <!-- Alerts -->
                <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <!-- Table -->
                <div class="data-table-wrapper">
                    <div class="data-table-header">
                        <h2>Registered Candidates</h2>
                        <input type="text" class="form-control" id="searchInput" placeholder="Search candidates…"
                            style="max-width:240px;">
                    </div>
                    <table class="table" id="candidatesTable">
                        <thead>
                            <tr>
                                <th>Candidate Name</th>
                                <th>Election</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="candidate : ${candidates}">
                                <td style="font-weight:500;" th:text="${candidate.name}"></td>
                                <td th:text="${candidate.election.name}"></td>
                                <td>
                                    <button class="btn btn-sm btn-danger" th:data-id="${candidate.id}"
                                        onclick="confirmDelete(this)">Delete</button>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(candidates)}" id="emptyRow">
                                <td colspan="3" style="text-align:center; padding:40px 20px; color:var(--slate-400);">
                                    No candidates found. Add one using the button above.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Candidate Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Add New Candidate</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <form th:action="@{/admin/candidates}" method="post">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label">Candidate Name</label>
                        <input type="text" class="form-control" name="name" placeholder="Enter candidate name" required>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label">Election</label>
                        <select class="form-control" name="electionId" required>
                            <option value="" disabled selected>Select an election</option>
                            <option th:each="election : ${elections}" th:value="${election.id}"
                                th:text="${election.name}"></option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Candidate</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('addModal').classList.add('active'); }
        function closeModal() { document.getElementById('addModal').classList.remove('active'); }

        document.getElementById('addModal').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        function confirmDelete(button) {
            if (confirm('Are you sure you want to delete this candidate?')) {
                const id = button.getAttribute('data-id');
                fetch(`/admin/candidates/${id}`, {
                    method: 'DELETE',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                }).then(r => r.ok ? window.location.reload() : alert('Error deleting candidate'));
            }
        }

        document.getElementById('searchInput').addEventListener('input', function () {
            const q = this.value.toLowerCase();
            document.querySelectorAll('#candidatesTable tbody tr').forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        });
    </script>
</body>

</html>
