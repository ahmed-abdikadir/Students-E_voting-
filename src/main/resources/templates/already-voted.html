<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Already Voted — E-Voting</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="page-center">
        <div class="card card-sm" style="text-align:center; padding:48px 40px;">
            <div class="state-icon state-icon-info" style="margin-bottom:20px;">ℹ</div>
            <h1 style="font-size:1.3rem; font-weight:700; color:var(--slate-900); margin-bottom:8px;">Already Voted</h1>
            <p style="font-size:0.9rem; color:var(--slate-500); margin-bottom:28px; line-height:1.6;">
                You have already cast your vote in this election.<br>Each student may only vote once per election.
            </p>
            <a th:href="@{/dashboard}" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </div>
</body>

</html>
