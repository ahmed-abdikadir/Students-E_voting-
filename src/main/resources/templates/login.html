<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — E-Voting System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-card { max-width: 520px; width: 100%; padding: var(--space-2xl); }
        .login-logo {
            width: 56px; height: 56px;
            background: var(--color-primary);
            border-radius: var(--r-lg);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
        }
        .login-action-row {
            margin-top: 20px;
        }
        .error-msg {
            background: var(--red-50);
            border: 1px solid #fecaca;
            color: var(--red-700);
            border-radius: var(--radius);
            padding: 10px 14px;
            font-size: 0.875rem;
            margin-bottom: 16px;
            text-align: center;
        }
    </style>
</head>
<body class="light" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
<div>
    <div class="card login-card">
        <div style="text-align:center; margin-bottom: 24px;">
            <div class="login-logo">🗳️</div>
            <h1 style="font-size:1.5rem; font-weight:var(--weight-display); color:var(--color-text-heading); margin-bottom:8px;">Student E-Voting</h1>
            <p style="font-size:14px; color:var(--color-text-muted);">Sign in to access your secure voting account</p>
        </div>

        <div class="error-msg" th:if="${param.error}">
            Invalid username or password. Please try again.
        </div>
        <div class="alert alert-success" th:if="${param.logout}" style="text-align:center;">
            You have been signed out successfully.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input id="username" type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group" style="margin-bottom:20px;">
                <label for="password" class="form-label">Password</label>
                <input id="password" type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">Sign In</button>
        </form>
    </div>
</div>
</body>
</html>
