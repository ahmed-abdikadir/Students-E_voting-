<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account — E-Voting</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .account-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 24px;
            align-items: start;
        }

        .profile-card {
            background: var(--white);
            border: 1px solid var(--slate-200);
            border-radius: var(--radius-lg);
            padding: 28px 24px;
            text-align: center;
        }

        .avatar {
            width: 72px;
            height: 72px;
            background: var(--blue-50);
            border: 2px solid var(--blue-100);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 14px;
        }

        .profile-username {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--slate-900);
            margin-bottom: 6px;
        }

        .password-rules {
            font-size: 0.78rem;
            color: var(--slate-400);
            margin-top: 4px;
        }

        @media (max-width: 700px) {
            .account-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- Top Navbar -->
    <nav class="student-navbar">
        <span class="navbar-brand">E-Voting System</span>
        <div class="navbar-user">
            <span th:text="${user.username}" style="font-weight:600;"></span>
            <a th:href="@{/student/dashboard}" class="btn btn-sm btn-secondary">← Dashboard</a>
            <a th:href="@{/login}" class="btn btn-sm btn-ghost">Sign Out</a>
        </div>
    </nav>

    <div class="student-page-body">
        <div style="width:100%; max-width:820px;">

            <div class="page-heading">
                <h1>My Account</h1>
                <p>Manage your account settings.</p>
            </div>

            <!-- Alerts -->
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="account-grid">

                <!-- Profile Info Card -->
                <div class="profile-card">
                    <div class="avatar">👤</div>
                    <div class="profile-username" th:text="${user.username}">username</div>
                    <span class="badge badge-blue"
                        th:classappend="${user.role?.name() == 'ADMIN'} ? 'badge-red' : 'badge-blue'"
                        th:text="${user.role?.name()?.toLowerCase()}">student</span>
                    <hr class="card-divider" style="margin: 20px 0;">
                    <div style="text-align:left;">
                        <p
                            style="font-size:0.78rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--slate-400); font-weight:600; margin-bottom:8px;">
                            Account Details</p>
                        <div
                            style="display:flex; justify-content:space-between; font-size:0.875rem; margin-bottom:8px;">
                            <span style="color:var(--slate-500);">Username</span>
                            <span style="font-weight:500;" th:text="${user.username}"></span>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-size:0.875rem;">
                            <span style="color:var(--slate-500);">Role</span>
                            <span style="font-weight:500; text-transform:capitalize;"
                                th:text="${user.role?.name()?.toLowerCase()}"></span>
                        </div>
                    </div>
                </div>

                <!-- Change Password Card -->
                <div class="card" style="padding: 28px 32px;">
                    <h2 style="font-size:1rem; font-weight:700; color:var(--slate-900); margin-bottom:4px;">Change
                        Password</h2>
                    <p style="font-size:0.875rem; color:var(--slate-500); margin-bottom:24px;">Choose a new password for
                        your account.</p>

                    <form th:action="@{/student/account/change-password}" method="post">
                        <div class="form-group">
                            <label class="form-label" for="currentPassword">Current Password</label>
                            <input id="currentPassword" type="password" name="currentPassword" class="form-control"
                                placeholder="Enter your current password" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="newPassword">New Password</label>
                            <input id="newPassword" type="password" name="newPassword" class="form-control"
                                placeholder="Enter your new password" minlength="6" required oninput="checkMatch()">
                            <p class="password-rules">Minimum 6 characters.</p>
                        </div>
                        <div class="form-group" style="margin-bottom:24px;">
                            <label class="form-label" for="confirmPassword">Confirm New Password</label>
                            <input id="confirmPassword" type="password" name="confirmPassword" class="form-control"
                                placeholder="Repeat your new password" required oninput="checkMatch()">
                            <p id="matchMsg" style="font-size:0.78rem; margin-top:4px; display:none;"></p>
                        </div>

                        <div style="display:flex; gap:10px;">
                            <button type="submit" class="btn btn-primary" id="submitBtn">Update Password</button>
                            <a th:href="@{/student/dashboard}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script>
        function checkMatch() {
            const np = document.getElementById('newPassword').value;
            const cp = document.getElementById('confirmPassword').value;
            const msg = document.getElementById('matchMsg');
            const btn = document.getElementById('submitBtn');

            if (cp.length === 0) { msg.style.display = 'none'; return; }

            if (np === cp) {
                msg.textContent = '✓ Passwords match';
                msg.style.color = 'var(--teal-600)';
                msg.style.display = 'block';
                btn.disabled = false;
            } else {
                msg.textContent = '✗ Passwords do not match';
                msg.style.color = 'var(--red-600)';
                msg.style.display = 'block';
                btn.disabled = true;
            }
        }
    </script>
</body>

</html>
