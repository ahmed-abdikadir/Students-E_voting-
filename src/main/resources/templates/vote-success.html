<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote Cast — E-Voting</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="page-center">
        <div class="card card-sm" style="text-align:center; padding:48px 40px;">
            <div class="state-icon state-icon-success" style="margin-bottom:20px;">✓</div>
            <h1 style="font-size:1.3rem; font-weight:700; color:var(--slate-900); margin-bottom:8px;">Vote Cast
                Successfully</h1>
            <p style="font-size:0.9rem; color:var(--slate-500); margin-bottom:28px; line-height:1.6;">
                Thank you for participating in this election.<br>Your vote has been securely recorded.
            </p>
            <a th:if="${role == 'STUDENT'}" th:href="@{/dashboard}" class="btn btn-primary">Return to Dashboard</a>
            <a th:if="${role == 'ADMIN'}" th:href="@{/admin/elections}" class="btn btn-primary">Return to Admin
                Panel</a>
        </div>
    </div>
</body>

</html>
