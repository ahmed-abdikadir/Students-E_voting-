<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Elections — E-Voting</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="admin-layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="sidebar-brand-name">E-Voting System</div>
                <div class="sidebar-brand-title">Admin Panel</div>
            </div>
            <ul class="sidebar-nav">
                <li><a href="/admin/dashboard">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7" />
                            <rect x="14" y="3" width="7" height="7" />
                            <rect x="3" y="14" width="7" height="7" />
                            <rect x="14" y="14" width="7" height="7" />
                        </svg>
                        Dashboard
                    </a></li>
                <li><a href="/admin/elections" class="active">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path
                                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                        </svg>
                        Elections
                    </a></li>
                <li><a href="/admin/candidates">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        Candidates
                    </a></li>
                <li><a href="/admin/students">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path
                                d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0" />
                        </svg>
                        Students
                    </a></li>
            </ul>
            <div class="sidebar-footer">
                <a th:href="@{/login}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Sign Out
                </a>
            </div>
        </aside>

        <!-- Main -->
        <div class="admin-main">
            <div class="admin-topbar">
                <span class="admin-topbar-title">Manage Elections</span>
            </div>

            <div class="admin-content">

                <!-- Alerts -->
                <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <!-- Create Election Form -->
                <div style="margin-bottom: 32px;">
                    <div class="section-header">
                        <h2>Create New Election</h2>
                    </div>
                    <div class="card" style="max-width: 480px; padding: 24px 28px;">
                        <form th:action="@{/admin/elections/create}" method="post">
                            <div class="form-group">
                                <label for="name" class="form-label">Election Name</label>
                                <input type="text" id="name" name="name" class="form-control"
                                    placeholder="e.g. Student Council Election 2025" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Create Election</button>
                        </form>
                    </div>
                </div>

                <!-- Elections Table -->
                <div class="section-header">
                    <h2>All Elections</h2>
                </div>
                <div class="data-table-wrapper">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="election : ${elections}">
                                <td style="color:var(--slate-400); font-size:0.8rem;" th:text="${election.id}"></td>
                                <td style="font-weight:500;" th:text="${election.name}"></td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${election.status?.name() == 'OPEN'} ? 'badge-green' : (${election.status?.name() == 'CLOSED'} ? 'badge-red' : 'badge-blue')"
                                        th:text="${election.status?.name()?.toLowerCase()}">
                                    </span>
                                </td>
                                <td>
                                    <div style="display:flex; gap:6px; flex-wrap:wrap; align-items:center;">
                                        <form th:action="@{/admin/elections/open/{id}(id=${election.id})}" method="post"
                                            style="display:inline;" th:if="${election.status?.name() == 'CREATED'}">
                                            <button type="submit" class="btn btn-sm btn-success">Open</button>
                                        </form>
                                        <form th:action="@{/admin/elections/close/{id}(id=${election.id})}"
                                            method="post" style="display:inline;"
                                            th:if="${election.status?.name() == 'OPEN'}">
                                            <button type="submit" class="btn btn-sm btn-secondary">Close</button>
                                        </form>
                                        <span th:if="${election.status?.name() == 'CLOSED'}"
                                            style="font-size:0.8rem; color:var(--slate-400);">Closed</span>
                                        <button type="button" class="btn btn-sm btn-danger" th:data-id="${election.id}"
                                            onclick="confirmDeleteElection(this)">Delete</button>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${elections.isEmpty()}">
                                <td colspan="4" style="text-align:center; padding:40px 20px; color:var(--slate-400);">
                                    No elections yet. Create one above.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function confirmDeleteElection(button) {
            if (confirm('Are you sure you want to delete this election? This action cannot be undone and will also delete all associated votes and candidates.')) {
                const electionId = button.getAttribute('data-id');
                fetch(`/admin/elections/delete/${electionId}`, {
                    method: 'DELETE',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' },
                    credentials: 'same-origin'
                })
                    .then(response => {
                        const ct = response.headers.get('content-type');
                        if (ct && ct.includes('application/json')) {
                            return response.json().then(data => ({ ok: response.ok, data }));
                        }
                        return response.text().then(text => ({ ok: response.ok, data: { message: text } }));
                    })
                    .then(result => {
                        if (!result.ok) throw new Error(result.data.message || 'Failed to delete election');
                        window.location.reload();
                    })
                    .catch(error => alert(error.message || 'Failed to delete election. Please try again.'));
            }
        }
    </script>
</body>

</html>
