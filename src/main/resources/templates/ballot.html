<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ballot — E-Voting</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <nav class="student-navbar">
        <span class="navbar-brand">E-Voting System</span>
        <div class="navbar-user">
            <a th:href="@{/dashboard}" class="btn btn-sm btn-secondary">← Back to Dashboard</a>
        </div>
    </nav>

    <div class="student-page-body">
        <div style="width:100%; max-width:600px;">

            <div class="page-heading">
                <h1>Ballot</h1>
                <p th:if="${election}" th:text="${election.name}" style="font-weight:600; color:var(--blue-700);">
                    Election Name</p>
            </div>

            <div class="info-block info-block-blue" style="margin-bottom:20px;">
                Review the candidates below and click <strong>Vote</strong> to select your candidate. You will be asked
                to confirm before your vote is submitted.
            </div>

            <!-- No candidates -->
            <div th:if="${candidates == null || #lists.isEmpty(candidates)}" class="card"
                style="text-align:center; padding:40px 32px;">
                <p style="color:var(--slate-500);">No candidates available for this election.</p>
            </div>

            <!-- Candidate list -->
            <ul class="candidate-list" th:if="${candidates != null && !#lists.isEmpty(candidates)}">
                <li class="candidate-item" th:each="candidate : ${candidates}">
                    <span class="candidate-name" th:text="${candidate.name}">Candidate Name</span>
                    <button class="btn btn-primary btn-sm"
                        th:onclick="'selectCandidate(' + ${candidate.id} + ',' + ${election.id} + ')'">
                        Vote
                    </button>
                </li>
            </ul>

        </div>
    </div>

    <script>
        function selectCandidate(candidateId, electionId) {
            window.location.href = `/student/vote/confirm?candidateId=${candidateId}&electionId=${electionId}`;
        }
    </script>
</body>

</html>
