<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Results — E-Voting</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .results-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 0;
            border-bottom: 1px solid var(--slate-200);
        }

        .results-row:last-child {
            border-bottom: none;
        }

        .results-candidate-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--slate-700);
            min-width: 140px;
        }

        .results-bar-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .vote-count-label {
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--blue-700);
            min-width: 30px;
            text-align: right;
        }
    </style>
</head>

<body>

    <nav class="student-navbar">
        <span class="navbar-brand">E-Voting System</span>
        <div class="navbar-user">
            <a th:href="@{/dashboard}" class="btn btn-sm btn-secondary">← Dashboard</a>
        </div>
    </nav>

    <div class="student-page-body">
        <div style="width:100%; max-width:680px;">

            <div class="page-heading">
                <h1 th:text="${election.name} + ' — Results'">Election Results</h1>
                <p style="color:var(--slate-500); font-size:0.875rem;">Final vote count for this election.</p>
            </div>

            <div class="data-table-wrapper">
                <div class="data-table-header">
                    <h2>Results Overview</h2>
                </div>
                <div style="padding: 8px 20px 20px;">
                    <div class="results-row" th:each="result : ${results}">
                        <span class="results-candidate-name" th:text="${result.key}">Candidate</span>
                        <div class="results-bar-wrap">
                            <div class="results-bar-container" style="flex:1;">
                                <div class="results-bar-fill" th:style="'width:' + ${result.value} + '%'">&nbsp;</div>
                            </div>
                            <span class="vote-count-label" th:text="${result.value}">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div style="margin-top: 24px;">
                <a th:href="@{/dashboard}" class="btn btn-secondary">← Back to Dashboard</a>
            </div>
        </div>
    </div>

</body>

</html>
