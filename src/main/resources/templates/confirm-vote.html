<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Vote — E-Voting</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .candidate-highlight {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--blue-700);
            padding: 16px;
            background: var(--blue-50);
            border: 2px solid var(--blue-100);
            border-radius: var(--radius);
            text-align: center;
            margin: 16px 0;
        }

        .btn-group-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-group-row .btn {
            flex: 1;
        }
    </style>
</head>

<body>

    <nav class="student-navbar">
        <span class="navbar-brand">E-Voting System</span>
        <div class="navbar-user">
            <span>Confirm Your Vote</span>
        </div>
    </nav>

    <div class="student-page-body">
        <div style="width:100%; max-width:520px;">

            <div class="card">
                <div style="text-align:center; margin-bottom:20px;">
                    <div class="state-icon state-icon-warning">⚠️</div>
                    <h2 style="font-size:1.25rem; font-weight:700; color:var(--slate-900);">Confirm Your Vote</h2>
                    <p style="font-size:0.9rem; color:var(--slate-500); margin-top:4px;">Please review carefully before
                        submitting.</p>
                </div>

                <hr class="card-divider">

                <div th:if="${election}">
                    <p
                        style="font-size:0.8rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--slate-400); font-weight:600; margin-bottom:4px;">
                        Election</p>
                    <p style="font-size:0.95rem; font-weight:600; color:var(--slate-700); margin-bottom:16px;"
                        th:text="${election.name}">Election Name</p>
                </div>

                <p
                    style="font-size:0.8rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--slate-400); font-weight:600; margin-bottom:4px;">
                    Your Selection</p>
                <div class="candidate-highlight" th:text="${candidate.name}">Candidate Name</div>

                <div class="info-block info-block-red" style="margin-top:16px;">
                    <strong>Important:</strong> Once you confirm, your vote cannot be changed or undone.
                </div>

                <form th:action="@{/student/vote/confirm}" method="post" style="margin:0;">
                    <div class="btn-group-row">
                        <button type="submit" class="btn btn-success btn-lg">Confirm Vote</button>
                        <a th:href="@{/dashboard}" class="btn btn-secondary btn-lg">Go Back</a>
                    </div>
                </form>
            </div>

        </div>
    </div>

</body>

</html>
