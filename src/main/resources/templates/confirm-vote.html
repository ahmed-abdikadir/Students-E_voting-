<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Your Vote — E-Voting</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .confirm-wrapper { max-width: 520px; width: 100%; margin: 0 auto; }
        
        .confirm-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--r-xl);
            padding: var(--space-2xl);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .alert-icon {
            width: 64px; height: 64px;
            background: #FEF3C7; color: #D97706;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto var(--space-lg);
        }

        .confirm-title { font-size: var(--text-h1); font-weight: var(--weight-display); color: var(--color-text-heading); margin-bottom: var(--space-sm); }
        .confirm-subtitle { font-size: 14px; color: var(--color-text-muted); margin-bottom: var(--space-xl); }

        .summary-box {
            background: var(--color-page);
            border: 1px solid var(--color-border);
            border-radius: var(--r-lg);
            padding: var(--space-lg);
            text-align: left;
            margin-bottom: var(--space-xl);
        }

        .summary-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-muted); margin-bottom: 4px; }
        .summary-value { font-size: 15px; font-weight: 600; color: var(--color-text-heading); margin-bottom: var(--space-md); }
        .summary-value:last-child { margin-bottom: 0; }
        
        .candidate-highlight {
            font-size: 18px; font-weight: 700; color: var(--color-accent);
            display: flex; align-items: center; gap: 12px; margin-top: 4px;
        }
        .candidate-avatar {
            width: 32px; height: 32px; border-radius: 50%; background: var(--color-accent); color: white;
            display: flex; align-items: center; justify-content: center; font-size: 14px;
        }

        .warning-text { font-size: 13px; color: var(--color-danger); background: #FEF2F2; padding: 12px; border-radius: var(--r-md); border: 1px dashed #FECACA; margin-bottom: var(--space-xl); }

        .btn-group { display: flex; gap: 12px; }
        .btn-group .btn { flex: 1; justify-content: center; height: 48px; }
    </style>
</head>
<body class="light" style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: var(--space-xl);">

    <div class="confirm-wrapper">
        <div class="confirm-card">
            
            <div class="alert-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            </div>
            
            <h1 class="confirm-title">Confirm Your Vote</h1>
            <p class="confirm-subtitle">Please review your selection carefully before submitting.</p>

            <div class="summary-box">
                <div th:if="${election}">
                    <div class="summary-label">Election</div>
                    <div class="summary-value" th:text="${election.name}">Election Name</div>
                </div>
                
                <div style="margin-top:var(--space-md);">
                    <div class="summary-label">Your Selection</div>
                    <div class="candidate-highlight">
                        <div class="candidate-avatar" th:text="${#strings.substring(candidate.name,0,1)}">C</div>
                        <span th:text="${candidate.name}">Candidate Name</span>
                    </div>
                </div>
            </div>

            <div class="warning-text">
                <strong style="display:block; margin-bottom:4px;">Important Note:</strong>
                Once confirmed, your vote is completely final and cannot be altered or undone under any circumstances.
            </div>

            <form th:action="@{/student/vote/confirm}" method="post" id="confirmForm">
                <input type="hidden" name="candidateId" th:value="${candidate.id}">
                <input type="hidden" name="electionId" th:value="${election.id}">
                <div class="btn-group">
                    <a th:href="@{/student/dashboard}" class="btn btn-secondary">Cancel & Go Back</a>
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <span class="btn-text">Submit Final Vote</span>
                        <span class="spinner" style="border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; width:16px; height:16px; animation:spin 1s linear infinite; display:none;"></span>
                    </button>
                </div>
            </form>

        </div>
    </div>

<script>
    const form = document.getElementById('confirmForm');
    const submitBtn = document.getElementById('submitBtn');
    form.addEventListener('submit', () => {
        submitBtn.querySelector('.btn-text').style.display = 'none';
        submitBtn.querySelector('.spinner').style.display = 'inline-block';
        submitBtn.style.pointerEvents = 'none';
        submitBtn.style.opacity = '0.8';
        document.querySelector('.btn-secondary').style.pointerEvents = 'none';
    });
</script>
<style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
</body>
</html>
